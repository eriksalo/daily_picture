version: 1
frontend:
  phases:
    preBuild:
      commands:
        - npm install
    build:
      commands:
        - npm run build
  artifacts:
    baseDirectory: frontend/dist
    files:
      - '**/*'
  cache:
    paths:
      - node_modules/**/*
  customHeaders:
    - pattern: '*.appcache'
      headers:
        - key: Content-Type
          value: text/cache-manifest
        - key: Cache-Control
          value: no-cache
