<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Daily Picture</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 1rem 1.5rem;
      background: linear-gradient(transparent, rgba(0,0,0,0.8));
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    .caption h2 { font-size: 1.2rem; font-weight: 400; }
    .caption p { font-size: 0.8rem; color: #aaa; margin-top: 0.2rem; }
    .error {
      color: #666;
      text-align: center;
      padding-top: 40vh;
      font-family: sans-serif;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <img id="photo" alt="" />
  <div class="caption" id="caption" hidden>
    <h2 id="title"></h2>
    <p id="year"></p>
  </div>
  <div class="error" id="error" hidden>No image available</div>
  <script>
    var API = 'https://wets9esbwj.execute-api.us-east-1.amazonaws.com/api/display?device=frameo';

    function load() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            document.getElementById('photo').src = data.image_url;
            document.getElementById('title').textContent = data.event_title;
            document.getElementById('year').textContent = data.event_year || '';
            document.getElementById('caption').hidden = false;
            document.getElementById('error').hidden = true;
          } catch (e) {
            document.getElementById('error').hidden = false;
          }
        } else {
          document.getElementById('error').hidden = false;
        }
      };
      xhr.send();
    }

    load();
    // Refresh every hour to pick up new images
    setInterval(load, 3600000);
  </script>
</body>
</html>
