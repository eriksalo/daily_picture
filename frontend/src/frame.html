<!DOCTYPE html>
<html lang="en" manifest="frame.appcache">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Daily Picture</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: #111;
      color: #ccc;
      font-family: sans-serif;
      text-align: center;
      padding-top: 20vh;
    }
    .overlay.visible { display: block; }
    .overlay h2 { font-size: 2.5em; margin-bottom: 0.5em; color: #fff; }
    .overlay p { font-size: 1.3em; margin: 0.5em 2em; line-height: 1.6; }
    .wifi-btn {
      display: inline-block;
      margin-top: 1.5em;
      padding: 0.8em 2em;
      font-size: 1.8em;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 12px;
      text-decoration: none;
      cursor: pointer;
    }
    .wifi-btn:active { background: #1558b0; }
    .status { font-size: 1em; color: #888; margin-top: 1.5em; }
  </style>
</head>
<body>
  <img id="photo" alt="" />
  <div class="overlay" id="offline">
    <h2>No Internet Connection</h2>
    <p>This frame needs WiFi to load today's picture.</p>
    <a class="wifi-btn" id="wifiBtn" href="intent:#Intent;action=android.settings.WIFI_SETTINGS;end">Open WiFi Settings</a>
    <p class="status" id="status"></p>
    <p class="status">If the button doesn't work, connect this<br>frame to a computer via USB and run:<br><b>.\scripts\frameo-wifi.ps1</b></p>
  </div>
  <script>
    var API = 'https://wets9esbwj.execute-api.us-east-1.amazonaws.com/api/display?device=frameo';
    var offlineEl = document.getElementById('offline');
    var photoEl = document.getElementById('photo');
    var statusEl = document.getElementById('status');
    var retryTimer = null;

    function showOffline() {
      offlineEl.className = 'overlay visible';
      photoEl.style.display = 'none';
      // Retry every 15 seconds
      if (!retryTimer) {
        retryTimer = setInterval(function() {
          statusEl.textContent = 'Checking connection...';
          load();
        }, 15000);
      }
    }

    function showOnline(url) {
      photoEl.src = url;
      photoEl.style.display = 'block';
      offlineEl.className = 'overlay';
      statusEl.textContent = '';
      if (retryTimer) {
        clearInterval(retryTimer);
        retryTimer = null;
      }
    }

    function load() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API, true);
      xhr.timeout = 10000;
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            showOnline(data.image_url);
          } catch (e) {
            showOffline();
          }
        } else {
          showOffline();
        }
      };
      xhr.ontimeout = function() { showOffline(); };
      xhr.onerror = function() { showOffline(); };
      xhr.send();
    }

    // WiFi button fallback: also try window.location for intent
    document.getElementById('wifiBtn').addEventListener('click', function(e) {
      statusEl.textContent = 'Opening WiFi settings...';
    });

    load();
    // Refresh every hour when online
    setInterval(load, 3600000);
  </script>
</body>
</html>
