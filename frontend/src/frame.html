<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Daily Picture</title>
  <style>
    * { margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }
    .error {
      color: #666;
      text-align: center;
      padding-top: 40vh;
      font-family: sans-serif;
      font-size: 1.2rem;
    }
  </style>
</head>
<body>
  <img id="photo" alt="" />
  <div class="error" id="error" hidden>No image available</div>
  <script>
    var API = 'https://wets9esbwj.execute-api.us-east-1.amazonaws.com/api/display?device=frameo';

    function load() {
      var xhr = new XMLHttpRequest();
      xhr.open('GET', API, true);
      xhr.onreadystatechange = function() {
        if (xhr.readyState !== 4) return;
        if (xhr.status === 200) {
          try {
            var data = JSON.parse(xhr.responseText);
            document.getElementById('photo').src = data.image_url;
            document.getElementById('error').hidden = true;
          } catch (e) {
            document.getElementById('error').hidden = false;
          }
        } else {
          document.getElementById('error').hidden = false;
        }
      };
      xhr.send();
    }

    load();
    // Refresh every hour to pick up new images
    setInterval(load, 3600000);
  </script>
</body>
</html>
